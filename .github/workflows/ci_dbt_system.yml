name: CI dbt PROJECT SYSTEM

on:
  push: 
    branches: [main, dev]
    paths:
      - '**dbt_transformations/**'
      - '**.github/**'

  pull_request: 
    branches: [main, dev]
    paths:
      - '**dbt_transformations/**'
      - '**.github/**'

jobs:
  validate_dbt:
    name: Build dbt Models and Containerize
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./dbt_transformations

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'
          cache: 'pip'
          cache-dependency-path: 'dbt_transformations/requirements.txt'

      - name: Install System Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install dbt Packages
        run: dbt deps

      - name: Cache dbt packages
        uses: actions/cache@v3
        with:
          path: dbt_transformations/dbt_packages
          key: dbt-cache-${{ hashFiles('dbt_transformations/packages.yml', 'dbt_transformations/package-lock.yml') }}
          restore-keys: |
            dbt-cache-

      - name: Parse the project
        run: dbt parse

      - name: Source Freshness Check in Dev
        run: dbt source freshness --target dev --profiles-dir .
      
      - name: dbt Build in Dev
        run: dbt build --target dev -s tag:dev --fail-fast --store-failures --profiles-dir .

      - name: Build System Container Image
        run: |
          docker build -t dbt-job:CI .