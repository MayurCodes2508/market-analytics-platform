name: CI - dbt Transformations

defaults:
  run:
    working-directory: './metadata_system/dbt/'

permissions:
  id-token: write
  contents: read

####################### Triggers ###############################

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'

    paths:
      - './metadata_system/dbt/**'
  
  pull_request:
    branches:
      - main
      - dev

    paths:
      - './metadata_system/dbt/**'

  workflow_dispatch:
    
######################## Jobs #######################################

jobs:

######################## Build #######################################

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: './metadata_system/dbt/requirements.txt'

      - name: Setup Dependencies & Validate
        run: |
          python -m ensurepip --default-pip
          pip install pip-tools
          pip-compile requirements.in 
          pip-sync requirements.txt
          pip check

      - name: Setup dbt Dependencies
        run: |
          dbt deps
        env:
          DBT_TARGET: ${{ vars.DBT_TARGET }}

      - name: dbt Build
        run: |
          dbt build -s "tag:observability,tag:prod" \
          --profiles-dir .
        env:
          DBT_TARGET: ${{ vars.DBT_TARGET }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

######################## Test #######################################

  test:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev' || github.ref_name == 'main' || startsWith(github.ref_name, 'feature/')
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Containerize & Run
        run: |
          docker build -t dbt-job .
          docker run \
          -e DBT_TARGET="${{ vars.DBT_TARGET }}" \
          -e GOOGLE_APPLICATION_CREDENTIALS="./tmp/creds.json" \
          -v "${{ steps.auth.outputs.credentials_file_path }}":./tmp/creds.json \
          dbt-job
