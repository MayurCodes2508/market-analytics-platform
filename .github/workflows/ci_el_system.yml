name: CI - EL CONFIG SYSTEM

on:
  push:
    branches: [main, dev]

    paths:
      - '**el_system/**'
      - '**.github/workflows/ci_el_system.yml**'
  
  pull_request:
    branches: [main, dev]

    paths:
      - '**el_system/**'
      - '**.github/workflows/ci_el_system.yml**'

jobs:
  validate_elt_system:
    name: Run EL Job & Containerize
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./el_system

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'el_system/requirements.txt'

      - name: Install System Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run System Python Code
        run: |
          python -u -m orchestrator.orchestrator
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ENV: ${{ vars.ENV }}

      - name: Build System Container Image
        run: |
          docker build -t el-job:CI .

      - name: Run Container Image Code
        run: |
          docker run -rm \
           -e COINGECKO_API_KEY \
           -e ENV \
           el-job:CI
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ENV: ${{ vars.ENV }}
          