name: CI - EL CONFIG SYSTEM

defaults:
  run:
    working-directory: ./el_system

permissions:
  id-token: write
  contents: read

####################### Triggers ###############################

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'

    paths:
      - 'el_system/**'
  
  pull_request:
    branches:
      - main
      - dev

    paths:
      - 'el_system/**'

  workflow_dispatch:

######################## Jobs #######################################

jobs:

######################## Build #######################################

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'el_system/requirements.txt'

      - name: Setup Dependencies & Validate
        run: |
          python -m ensurepip --default-pip
          pip install pip-tools
          pip-compile requirements.in 
          pip-sync requirements.txt
          pip check

      - name: Run Code
        run: |
          python -u -m orchestrator.orchestrator
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ENV: ${{ vars.ENV }}

######################## Test #######################################

  test:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev'
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'el_system/requirements.txt'

      - name: Setup Dependencies & Validate
        run: |
          python -m ensurepip --default-pip
          pip install pip-tools
          pip-compile dev-requirements.in 
          pip-sync dev-requirements.txt
          pip check

      - name: Ruff Tests
        run: |
          ruff check .
          ruff format --check .


      - name: Containerize & Run
        run: |
          docker build -t el-job .
          docker run \
          -e COINGECKO_API_KEY \
          -e ENV \
          el-job
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ENV: ${{ vars.ENV }}