name: CI - METADATA CONFIG SYSTEM

on:
  push:
    branches: [main, dev]

    paths:
      - '**metadata_system/**'
      - '**.github/workflows/ci_metadata_system.yml**'
  
  pull_request:
    branches: [main, dev]

    paths:
      - '**metadata_system/**'
      - '**.github/workflows/ci_metadata_system.yml**'

jobs:
  validate_metadata_system:
    name: Run Metadata Job & Containerize
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./metadata_system

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.14.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'
          cache: 'pip'
          cache-dependency-path: 'metadata_system/requirements.txt'

      - name: Install System Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run System Python Code
        run: |
          python -u -m orchestrator.orchestrator
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}

      - name: Build System Container Image
        run: |
          docker build -t metadata-system-job:CI .
          