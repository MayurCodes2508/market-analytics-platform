name: CI - METADATA CONFIG SYSTEM

####################### Triggers ###############################

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'

    paths:
      - 'orchestrator/**'
      - '.github/workflows/ci_metadata_system.yml'
  
  pull_request:
    branches:
      - main
      - dev
      - 'feature/**'

    paths:
      - 'orchestrator/**'
      - '.github/workflows/ci_metadata_system.yml'

######################## Jobs #######################################

jobs:
  validate_metadata_system:
    name: Run Code & Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./metadata_system

################################ Steps #########################################

############################### Runtime Setup ###################################

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'metadata_system/requirements.txt'

###################### Dependency Setup #######################

      - name: Check For Pip Existance
        run: |
          python -m ensurepip --default-pip

      - name: Install Pip Tools
        run: |
          pip install pip-tools

      - name: Compile Dependencies
        run: |
          pip-compile requirements.in 
          pip-compile dev-requirements.in 

      - name: Sync Dependencies
        run: |
          pip-sync requirements.txt dev-requirements.txt

      - name: Check for Broken Dependencies
        run: |
          pip check

###################### Code QT ##########################################

      - name: Code Linting Check
        run: |
          ruff check .

      - name: Code Formatting Check
        run: |
          ruff format --check .

########################### Run Code ##########################################

      - name: Run Code
        run: |
          python -u -m orchestrator.orchestrator
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          ENV: ${{ vars.ENV }}


          