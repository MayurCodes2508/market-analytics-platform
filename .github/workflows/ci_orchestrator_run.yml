name: CI ORCHESTRATOR RUN

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'

    paths:
      - 'orchestrator/**'
      - '.github/workflows/ci_orchestrator_run.yml'
  
  pull_request:
    branches:
      - main
      - dev
      - 'feature/**'

    paths:
      - 'orchestrator/**'
      - '.github/workflows/ci_orchestrator_run.yml'

jobs:
  validate_orchestrator:
    name: Run Code & Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./orchestrator

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'orchestrator/requirements.txt'

###################### Pip Setup & Dependency Installation #######################

      - name: Check For Pip Existance
        run: |
          python -m ensurepip --default-pip

      - name: Install Pip Tools
        run: |
          pip install pip-tools

      - name: Compile Dependencies
        run: |
          pip-compile dev-requirements.in

      - name: Sync Dependencies
        run: |
          pip-sync dev-requirements.txt

###################### Dependency Tests ##########################################

      - name: Check for Broken Dependencies
        run: |
          pip check

      - name: Run Python Code
        run: |
          python -u -m orchestrator.orchestrator
        env:
          DB_URL: ${{ secrets.DB_URL }}
          TRIGGERED_BY: ${{ vars.TRIGGERED_BY }}
          ENV: ${{ vars.ENV }}

          