name: CI ORCHESTRATOR RUN

defaults:
  run:
    working-directory: ./platform/orchestrator/

permissions:
  id-token: write
  contents: read

####################### Triggers ###############################

on:
  push:
    branches:
      - main
      - dev
      - feature/**

    paths:
      - platform/orchestrator/**
  
  pull_request:
    branches:
      - main
      - dev

    paths:
      - platform/orchestrator/**

  workflow_dispatch:

######################## Jobs #######################################

jobs:

######################## Build #######################################

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: './platform/requirements.txt'

      - name: Setup Dependencies & Validate
        working-directory: './platform/'
        run: |
          python -m ensurepip --default-pip
          pip install pip-tools
          pip-compile requirements.in 
          pip-sync requirements.txt
          pip check

      - name: Run Code
        run: |
          python -u -m orchestrator.main
        env:
          DB_URL: ${{ secrets.DB_URL }}
          ENV: ${{ vars.ENV }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

######################## Test #######################################

  test:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev' || github.ref_name == 'main' || startsWith(github.ref_name, 'feature/')
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: './orchestrator/requirements.txt'

      - name: Setup Dependencies & Validate
        run: |
          python -m ensurepip --default-pip
          pip install pip-tools
          pip-compile dev-requirements.in 
          pip-sync dev-requirements.txt
          pip check

      - name: Ruff Test
        run: |
          ruff check .

      - name: Ruff Test
        run: |
          ruff format --check .
        continue-on-error: true

      - name: Containerize & Run
        run: |
          docker build -t pipeline-run .
          docker run \
          -e DB_URL="${{ secrets.DB_URL }}" \
          -e ENV="${{ vars.ENV }}" \
          -e GOOGLE_APPLICATION_CREDENTIALS="./creds.json" \
          -v "${{ steps.auth.outputs.credentials_file_path }}":./creds.json \
          pipeline-run
