name: CI PIPELINE RUN

on:
  push:
    branches: [main, dev]

    paths:
      - '**orchestrator/**'
      - '**.github/**'
  
  pull_request:
    branches: [main, dev]

    paths:
      - '**orchestrator/**'
      - '**.github/**'

jobs:
  validate_orchestrator:
    name: Run Pipeline and Containerize
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./orchestrator

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/144449440045/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-workflows@instant-medium-491107-t6.iam.gserviceaccount.com"

      - name: Set up python 3.14.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'
          cache: 'pip'
          cache-dependency-path: 'orchestrator/requirements.txt'

      - name: Install Pipeline Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Pipeline Python Code
        run: |
          python -u -m orchestrator.orchestrator --file_path configs/pipeline_configs/dev/market_analytics.json --schema_path schemas/pipeline_schema.json
        env:
          DB_URL: ${{ secrets.DB_URL }}

      - name: Build Pipeline Container Image
        run: |
          docker build -t pipeline-run:CI .
          