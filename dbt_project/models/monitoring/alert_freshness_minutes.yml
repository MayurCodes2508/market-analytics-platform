version: 2

models:
  - name: alert_freshness_minutes
    description: >
      This table monitors the timeliness of data processing workflows. It tracks the age
      of data within various processing stages and identifies instances where data
      processing deviates from expected freshness levels. The table supports detection
      of potential issues in data pipelines and helps ensure data is processed and
      available within acceptable timeframes.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_freshness_anomaly IS TRUE OR is_freshness_anomaly IS FALSE"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_freshness_anomaly IS FALSE OR is_freshness_anomaly IS TRUE AND freshness_minutes > 90"

    columns:
      - name: pipeline_name
        description: "This column contains the name of the data processing pipeline."

      - name: created_at
        description: "This column holds the timestamp when the freshness record was created."

      - name: freshness_minutes
        description: "This column stores the age of the data in minutes."
        tests:
          - not_null

      - name: is_freshness_anomaly
        description: "This column indicates whether the data's freshness is considered anomalous (true) or not (false)."
        tests:
          - not_null
