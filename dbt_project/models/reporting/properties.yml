version: 2

models:
  - name: slo_successful_runs_success_rate_for_the_day_and_over_30_days
    description: |
      Tracks whether automated pipelines meet successful-run rate SLOs for the current day and a rolling 30-day window. Supports reliability reporting, operational efficiency analysis, and identifies when service level objectives (SLOs) are breached.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "success_rate_for_the_day >= 0 AND success_rate_for_the_day <= 1"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "success_rate_over_30_days >= 0 AND success_rate_over_30_days <= 1"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_for_the_day_breached IS true OR is_slo_threshold_for_the_day_breached IS false"
      
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_for_the_day_breached IS false OR is_slo_threshold_for_the_day_breached IS true AND success_rate_for_the_day < 0.95"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_over_30_days_breached IS true or is_slo_threshold_over_30_days_breached IS false"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_over_30_days_breached IS false OR is_slo_threshold_over_30_days_breached IS true AND success_rate_over_30_days < 0.99"
          

    columns:
      - name: pipeline_name
        description: "Name of the monitored automated pipeline or process."

      - name: created_at
        description: "Date on which the performance metric row was recorded."

      - name: success_rate_for_the_day
        description: "Daily percentage of pipeline runs that completed successfully within the runtime SLO."
        tests:
          - not_null

      - name: is_slo_threshold_for_the_day_breached
        description: "Indicates whether the daily runtime success-rate SLO was breached. TRUE means the daily success-rate target was missed; FALSE means it was met."
        tests:
          - not_null

      - name: success_rate_over_30_days
        description: "Rolling 30-day success rate percentage for pipeline runs that met the runtime SLO."
        tests:
          - not_null

      - name: is_slo_threshold_over_30_days_breached
        description: "Indicates whether the 30-day rolling runtime success-rate SLO was breached. TRUE means the 30-day success-rate target was missed; FALSE means it was met."
        tests:
          - not_null

  - name: slo_successful_runs_success_rate_of_runtime_in_seconds_for_the_day_and_over_30_days
    description: |
      Tracks whether data pipelines meet runtime success SLOs for the current day and a rolling 30-day window. It supports pipeline health monitoring, operational efficiency reporting, and detection of SLO breaches for runtime-based success rates.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "success_rate_for_the_day >= 0 AND success_rate_for_the_day <= 1"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "success_rate_over_30_days >= 0 AND success_rate_over_30_days <= 1"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_for_the_day_breached IS true OR is_slo_threshold_for_the_day_breached IS false"
      
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_for_the_day_breached IS false OR is_slo_threshold_for_the_day_breached IS true AND success_rate_for_the_day < 0.95"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_over_30_days_breached IS true or is_slo_threshold_over_30_days_breached IS false"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_slo_threshold_over_30_days_breached IS false OR is_slo_threshold_over_30_days_breached IS true AND success_rate_over_30_days < 0.99"

    columns:
      - name: pipeline_name
        description: "Identifier of the monitored data pipeline."

      - name: created_at
        description: "Date when this daily SLO performance record was captured."

      - name: success_rate_for_the_day
        description: "Daily success rate percentage for pipeline runs that met the runtime SLO."
        tests:
          - not_null

      - name: is_slo_threshold_for_the_day_breached
        description: "Boolean indicating whether the pipeline failed to meet the daily runtime success SLO. TRUE means the daily success rate fell below the target threshold."
        tests:
          - not_null

      - name: success_rate_over_30_days
        description: "Rolling 30-day success rate percentage for pipeline runs that met the runtime SLO."
        tests: 
          - not_null
 
      - name: is_slo_threshold_over_30_days_breached
        description: "Boolean indicating whether the pipeline failed to meet the 30-day rolling runtime success SLO. TRUE means the 30-day success rate fell below the target threshold."
        tests:
          - not_null
