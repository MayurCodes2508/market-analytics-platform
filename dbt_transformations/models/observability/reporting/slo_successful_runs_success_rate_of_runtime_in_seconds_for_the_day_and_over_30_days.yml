version: 2

models:

  - name: slo_successful_runs_success_rate_of_runtime_in_seconds_for_the_day_and_over_30_days

    description: |
      Tracks whether data pipelines meet runtime success SLOs for the current day and
      a rolling 30-day window. It supports pipeline health monitoring, operational efficiency reporting,
      and detection of SLO breaches for runtime-based success rates.

    data_tests:
      - dbt_utils.expression_is_true:
          config:
            tags: ['dev', 'prod']
          arguments:
            expression: "success_rate_for_the_day BETWEEN 0 AND 1"

      - dbt_utils.expression_is_true:
          config:
            tags: ['dev', 'prod']
          arguments:
            expression: "success_rate_over_30_days BETWEEN 0 AND 1"

      - dbt_utils.expression_is_true:
          config:
            tags: ['dev', 'prod']
          arguments:
            expression: "is_slo_threshold_for_the_day_breached IS TRUE OR is_slo_threshold_for_the_day_breached IS FALSE"
      
      - dbt_utils.expression_is_true:
          config:
            tags: ['dev', 'prod']
          arguments:
            expression: "CASE
                           WHEN is_slo_threshold_for_the_day_breached IS FALSE THEN success_rate_for_the_day >= 0.95
                           WHEN is_slo_threshold_for_the_day_breached IS TRUE  THEN success_rate_for_the_day < 0.95
                           ELSE FALSE
                         END"

      - dbt_utils.expression_is_true:
          config:
            tags: ['dev', 'prod']
          arguments:
            expression: "is_slo_threshold_over_30_days_breached IS TRUE or is_slo_threshold_over_30_days_breached IS FALSE"

      - dbt_utils.expression_is_true:
          config:
            tags: ['dev', 'prod']
          arguments:
            expression: "CASE
                           WHEN is_slo_threshold_over_30_days_breached IS FALSE THEN success_rate_over_30_days >= 0.99
                           WHEN is_slo_threshold_over_30_days_breached IS TRUE  THEN success_rate_over_30_days < 0.99
                           ELSE FALSE
                         END"
          
    columns:
      - name: pipeline_name
        description: "Name of the monitored automated pipeline or process."

      - name: created_at
        description: "Date on which the performance metric row was recorded."

      - name: success_rate_for_the_day
        description: "Daily ratio of pipeline runs that completed successfully within the runtime SLO."
        data_tests:
          - not_null:
              config:
                tags: ['prod', 'dev']

      - name: is_slo_threshold_for_the_day_breached
        description: "{{ doc('pipeline_runs_runtime_success_rate_in_seconds_slo_breached_for_the_day') }}"
        data_tests:
          - not_null:
              config:
                tags: ['prod', 'dev']

      - name: success_rate_over_30_days
        description: "Rolling 30-day success rate ratio for pipeline runs that met the runtime SLO."
        data_tests:
          - not_null:
              config:
                tags: ['prod', 'dev']

      - name: is_slo_threshold_over_30_days_breached
        description: "{{ doc('pipeline_runs_runtime_success_rate_in_seconds_slo_breached_over_30_days') }}"
        data_tests:
          - not_null:
              config:
                tags: ['prod', 'dev']

