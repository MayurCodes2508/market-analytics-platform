version: 2

models:
  - name: stg_pipeline_runs

    description: |
      Staging model for pipeline run metadata that standardizes raw execution records into a clean format for downstream
      reporting, monitoring, and SLO analysis.
      
    config:
      contract:
        enforced: true

    columns:
      - name: run_id
        description: Unique identifier for each pipeline run event.
        data_type: string
        data_tests:
          - unique:
              config:
                tags: ['prod', 'dev']

      - name: pipeline_name
        description: Name of the pipeline executed.
        data_type: string

      - name: job_name
        description: Name of the specific job within the pipeline.
        data_type: string

      - name: job_type
        description: Type of job being executed.
        data_type: string

      - name: error_message
        description: Error text captured when the pipeline run failed or encountered an issue.
        data_type: string

      - name: status
        description: "{{ doc('pipeline_runs_status') }}"
        data_type: string

      - name: start_time
        description: Timestamp when the pipeline run started.
        data_type: timestamp

      - name: end_time
        description: Timestamp when the pipeline run finished.
        data_type: timestamp

      - name: created_at
        description: Timestamp when the pipeline run record was created.
        data_type: timestamp

      - name: ingestion_ts
        description: Timestamp when this record was ingested into the warehouse.
        data_type: timestamp
