version: 2

sources:
  - name: metadata
    database: instant-medium-491107-t6
    schema: "{{ target.schema }}"
    tables:
      - name: raw_pipeline_runs

        description: |
          This table stores metadata about the execution of various data pipelines. It captures essential details
          about each pipeline run, including its operational status and any encountered issues.
          The table supports monitoring pipeline health and performance, and facilitates auditing of data processing activities.
        
        config:
          loaded_at_field: ingestion_ts
          freshness:
            warn_after:
              count: 3
              period: hour
            error_after:
              count: 6
              period: hour
        
        data_tests:
          - dbt_utils.expression_is_true:
              config:
                tags: ['prod', 'dev']
              arguments:
                expression: "end_time > start_time"

          - dbt_utils.expression_is_true:
              config:
                tags: ['prod', 'dev']
              arguments:
                expression: "ingestion_ts >= created_at"

          - dbt_utils.expression_is_true:
              config:
                tags: ['prod', 'dev']
              arguments:
                expression: "rows_processed >= 0"

          - dbt_utils.expression_is_true:
              config:
                tags: ['dev']
              arguments:
                expression: "CASE
                               WHEN job_name LIKE 'dev_%' THEN rows_processed BETWEEN 0 AND 250
                               ELSE FALSE
                             END"

          - dbt_utils.expression_is_true:
              config:
                tags: ['prod']
              arguments:
                expression: "CASE
                               WHEN job_name LIKE 'prod_%' THEN rows_processed = 0 OR rows_processed = 250
                               ELSE FALSE
                             END"

          - dbt_utils.expression_is_true:
              config:
                tags: ['prod', 'dev']
              arguments:
                expression: "CASE
                               WHEN status = 'SUCCESS' THEN error_message IS NULL
                               WHEN status = 'FAILED'  THEN error_message IS NOT NULL
                               ELSE FALSE
                             END"

          - dbt_utils.expression_is_true:
              config:
                tags: ['prod', 'dev']
              arguments:
                expression: "CASE
                               WHEN status = 'SUCCESS' THEN rows_processed > 0
                               WHEN status = 'FAILED'  THEN rows_processed >= 0
                               ELSE FALSE
                             END"

        columns:
          - name: run_id
            description: Unique identifier for each pipeline run event.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: pipeline_name
            description: Name of the pipeline executed.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: job_name
            description: Name of the specific job within the pipeline.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: job_type
            description: Type of job being executed.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: rows_processed
            description: "{{ doc('pipeline_runs_rows_processed') }}"
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: error_message
            description: Error text captured when the pipeline run failed or encountered an issue.

          - name: status
            description: "{{ doc('pipeline_runs_status') }}"
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']
              - accepted_values:
                  config:
                    tags: ['prod', 'dev']
                  arguments:
                    values: ['SUCCESS', 'FAILED']

          - name: start_time
            description: Timestamp when the pipeline run started.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: end_time
            description: Timestamp when the pipeline run finished.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: created_at
            description: Timestamp when the pipeline run record was created.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']

          - name: ingestion_ts
            description: Timestamp when this record was ingested into the warehouse.
            data_tests:
              - not_null:
                  config:
                    tags: ['prod', 'dev']
